<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1120"/>
      <stop offset="100%" stop-color="#131929"/>
    </linearGradient>
    <!-- Mic body gradient -->
    <linearGradient id="mic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle radial glow behind mic -->
  <circle cx="16" cy="14" r="9" fill="rgba(99,102,241,0.18)"/>

  <!-- Microphone body (rounded rect) -->
  <rect x="12" y="5" width="8" height="13" rx="4" fill="url(#mic)" filter="url(#glow)"/>

  <!-- Mic arc (the stand bracket) -->
  <path
    d="M9 16 Q9 22 16 22 Q23 22 23 16"
    stroke="url(#mic)" stroke-width="1.8"
    fill="none" stroke-linecap="round" filter="url(#glow)"
  />

  <!-- Mic stand line -->
  <line x1="16" y1="22" x2="16" y2="26.5"
    stroke="#818cf8" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Stand base -->
  <line x1="12" y1="26.5" x2="20" y2="26.5"
    stroke="#818cf8" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Sound wave dots (right side, small) -->
  <circle cx="25" cy="11" r="0.9" fill="#06b6d4" opacity="0.7"/>
  <circle cx="27" cy="14" r="0.9" fill="#06b6d4" opacity="0.5"/>
  <circle cx="25" cy="17" r="0.9" fill="#06b6d4" opacity="0.3"/>
</svg>
